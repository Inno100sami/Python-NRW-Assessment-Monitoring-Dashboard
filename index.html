<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NRW Dashboard — Water Supply Monitoring</title>
  <meta name="description" content="Non-Revenue Water monitoring dashboard. Configurable for any district, operator, WSS, or DMA — no coding required.">
  <meta http-equiv="refresh" content="0; url=NRW_Dashboard_v3.html">
  <style>
    :root{--bg:#0a0e1a;--accent:#38bdf8;--muted:#64748b;--text:#e2e8f0}
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--text);font-family:'DM Sans',system-ui,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center}
    .splash{text-align:center;padding:40px 24px;max-width:400px}
    .logo{width:56px;height:56px;background:linear-gradient(135deg,#38bdf8,#0ea5e9);border-radius:13px;display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;font-weight:700;color:#fff;font-size:14px;margin:0 auto 22px}
    h1{font-family:'Space Mono',monospace;font-size:14px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);margin-bottom:8px}
    p{font-size:12px;color:var(--muted);margin-bottom:24px;line-height:1.6}
    .spinner{width:28px;height:28px;border:2px solid rgba(56,189,248,.15);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 18px}
    @keyframes spin{to{transform:rotate(360deg)}}
    a{color:var(--accent);font-size:12px;text-decoration:none;border-bottom:1px solid rgba(56,189,248,.3);padding-bottom:1px}
    a:hover{border-color:var(--accent)}
  </style>
</head>
<body>
  <div class="splash">
    <div class="logo">NRW</div>
    <h1>NRW Dashboard</h1>
    <p>Water Supply Monitoring Tool<br>Configurable for any operator, district, WSS &amp; DMA</p>
    <div class="spinner"></div>
    <a href="NRW_Dashboard_v3.html">Click here if not redirected automatically</a>
  </div>
  <script>window.location.replace('NRW_Dashboard_v3.html');</script>
</body>
</html>
